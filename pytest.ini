[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers (add more as needed)
markers =
    unit: Pure unit tests with no external dependencies
    integration: Tests that mock external services
    slow: Tests that take longer to run
