```yaml
# ── Global Environment Variables ──────────────────────────────────────────────
env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: tripmind-app
  ECS_SERVICE: tripmind-live-service
  ECS_CLUSTER: tripmind-llmops-cluster
  ECS_TASK_FAMILY: llmopstdlive
  ECS_TASK_DEFINITION: .github/workflows/task_definition.json
  CONTAINER_NAME: tripmind-live-container

# ── Job 3: Deploy to ECS Fargate ─────────────────────────────────────────────
deploy:
  name: Deploy to ECS Fargate
  needs: [build-and-push]
  runs-on: ubuntu-latest

  steps:
    - name: Checkout Repo
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Download Task Definition from ECS
      run: |
        aws ecs describe-task-definition \
          --task-definition ${{ env.ECS_TASK_FAMILY }} \
          --query taskDefinition \
          > ${{ env.ECS_TASK_DEFINITION }}

    - name: Update ECS Task Definition with New Image
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ needs.build-and-push.outputs.image }}

    - name: Deploy to Amazon ECS Service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Deployment Success
      run: |
        echo "🚀 Deployment complete!"
        echo "Image: ${{ needs.build-and-push.outputs.image }}"
        echo "Service: ${{ env.ECS_SERVICE }}"
        echo "Cluster: ${{ env.ECS_CLUSTER }}"
```

