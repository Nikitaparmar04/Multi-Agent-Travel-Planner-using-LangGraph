# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Multi-Agent Trip Planner
# ─────────────────────────────────────────────────────────────────────────────
#
# Triggers  : every push to main/dev, every pull request targeting main
# Python    : 3.12 (matches .python-version & pyproject.toml requires-python)
# Jobs      : lint -> unit-tests -> integration-tests -> all-tests + coverage
# No real API keys needed — all external calls are mocked in tests.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --exclude=.venv,__pycache__,.git,*.egg-info \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --count \
            --statistics

  # ── Job 2: Unit Tests ───────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      GROQ_API_KEY: fake-groq-key-for-ci
      OPENAI_API_KEY: fake-openai-key-for-ci
      OPENWEATHERMAP_API_KEY: fake-weather-key-for-ci
      EXCHANGE_RATE_API_KEY: fake-exchange-key-for-ci
      CURRENCY_API_KEY: fake-currency-key-for-ci
      GPLACES_API_KEY: fake-google-places-key-for-ci
      TAVILY_API_KEY: fake-tavily-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          mkdir -p reports
          python -m pytest tests/ \
            --ignore=tests/test_integration.py \
            -v \
            --tb=short \
            --junitxml=reports/unit-test-results.xml

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/unit-test-results.xml

  # ── Job 3: Integration Tests ─────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      GROQ_API_KEY: fake-groq-key-for-ci
      OPENAI_API_KEY: fake-openai-key-for-ci
      OPENWEATHERMAP_API_KEY: fake-weather-key-for-ci
      EXCHANGE_RATE_API_KEY: fake-exchange-key-for-ci
      CURRENCY_API_KEY: fake-currency-key-for-ci
      GPLACES_API_KEY: fake-google-places-key-for-ci
      TAVILY_API_KEY: fake-tavily-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: |
          mkdir -p reports
          python -m pytest tests/test_integration.py \
            -v \
            --tb=short \
            --junitxml=reports/integration-test-results.xml

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration-test-results.xml

  # ── Job 4: All Tests + Coverage ──────────────────────────────────────────────
  all-tests:
    name: All Tests and Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    env:
      GROQ_API_KEY: fake-groq-key-for-ci
      OPENAI_API_KEY: fake-openai-key-for-ci
      OPENWEATHERMAP_API_KEY: fake-weather-key-for-ci
      EXCHANGE_RATE_API_KEY: fake-exchange-key-for-ci
      CURRENCY_API_KEY: fake-currency-key-for-ci
      GPLACES_API_KEY: fake-google-places-key-for-ci
      TAVILY_API_KEY: fake-tavily-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run all tests with coverage
        run: |
          mkdir -p reports
          python -m pytest tests/ \
            -v \
            --tb=short \
            --cov=. \
            --cov-omit=".venv/*,tests/*,setup.py" \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reports/coverage.xml
